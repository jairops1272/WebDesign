<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="./assets/img/favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="./assets/css/style.css"/>
    <title>Contáctanos y Regístrate</title>
</head>

<body class="body">

    <!-- NAVBAR -->
    <nav class="navbar">

        <div class="navbar-container">

            <div class="navbar-logo">
                <a href="#"><i class="fa-solid fa-code"></i>Sitio</a>
            </div>

            <ul class="navbar-menu">

                <li class="nav-item">
                    <a href="#" class="nav-link">Inicio</a>
                </li>

                <li class="nav-item">
                    <a href="#" class="nav-link">Servicios</a>
                </li>

                <li class="nav-item">
                    <a href="#" class="nav-link">Contacto</a>
                </li>

                <li class="nav-item">
                    <a href="#" class="nav-link">Registro</a>
                </li>

            </ul>

        </div>

    </nav>


    <!-- CONTENIDO PRINCIPAL -->
    <main class="main-container">

        <section class="contact-section">

            <div class="overlay">

                <article class="form-card">

                    <header class="form-header">
                        <h1 class="form-title">Contáctanos y regístrate</h1>
                        <p class="form-subtitle">
                            Déjanos tus datos y nos comunicaremos contigo pronto.
                        </p>
                    </header>

                    <form class="contact-form" action="#" method="post">

                        <div class="form-row">

                            <div class="form-group">
                                <label for="nombre" class="form-label">Nombre Completo</label>
                                <div class="input-box">
                                    <i class="fa-solid fa-user icon"></i>
                                    <input 
                                        type="text" 
                                        id="nombre" 
                                        name="nombre" 
                                        class="form-input"
                                        placeholder="Ej. Ana Pérez García"
                                        required>
                                </div>
                            </div>

                            <div class="form-group">
                                <label for="correo" class="form-label">Correo Electrónico</label>
                                <div class="input-box">
                                    <i class="fa-solid fa-envelope icon"></i>
                                    <input 
                                        type="email" 
                                        id="correo" 
                                        name="correo" 
                                        class="form-input"
                                        placeholder="ana1@ejemplo.com"
                                        required>
                                </div>
                            </div>

                        </div>

                        <div class="form-row">

                            <div class="form-group">
                                <label for="telefono" class="form-label">Número de Teléfono</label>
                                <div class="input-box">
                                    <i class="fa-solid fa-phone icon"></i>
                                    <input 
                                        type="tel" 
                                        id="telefono" 
                                        name="telefono" 
                                        class="form-input"
                                        placeholder="+52 7717171711">
                                </div>
                            </div>

                            <div class="form-group">
                                <label for="asunto" class="form-label">Asunto</label>
                                <div class="input-box">
                                    <i class="fa-solid fa-circle-info icon"></i>
                                    <select id="asunto" name="asunto" class="form-select" required>
                                        <option value="" disabled selected>Selecciona el motivo</option>
                                        <option value="informacion">Información</option>
                                        <option value="cotizacion">Cotización</option>
                                        <option value="soporte">Soporte</option>
                                        <option value="otro">Otro</option>
                                    </select>
                                </div>
                            </div>

                        </div>

                        <div class="form-group full-width">
                            <label for="mensaje" class="form-label">Mensaje</label>
                            <div class="textarea-box">
                                <i class="fa-solid fa-comment-dots icon"></i>
                                <textarea 
                                    id="mensaje" 
                                    name="mensaje" 
                                    class="form-textarea"
                                    placeholder="Escribe tu mensaje aquí"
                                    rows="4"
                                    required></textarea>
                            </div>
                        </div>

                        <div class="button-container">
                            <button type="submit" class="submit-button">
                                Enviar Mensaje <i class="fa-solid fa-paper-plane" style="margin-left: 10px;"></i>
                            </button>
                        </div>

                    </form>

                </article>

            </div>

        </section>

    </main>


    <!-- FOOTER -->
    <footer class="footer">

        <div class="footer-container">

            <h3 class="footer-title">Datos del Programador</h3>

            <p class="footer-text">
                <i class="fa-solid fa-user"></i> Nombre: Jairo Pineda Sanchez
            </p>

            <p class="footer-text">
                <i class="fa-solid fa-laptop-code"></i> Carrera: Sistemas Computacionales
            </p>

            <div class="footer-copy">
                © 2026 Todos los derechos reservados
            </div>

        </div>

    </footer>

</body>
</html>
